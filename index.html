<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAARD | Ecosistema</title>
    <style>
        body { margin: 0; padding: 10px; font-family: sans-serif; text-align: center; color: white; background: url('https://ipfs.io/ipfs/bafybeic3rhz5qpxq3slf4n77h6jwhtspd3jifjm2z7777cm4whniozi32u') no-repeat center center fixed; background-size: cover; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        /* Pantalla de bienvenida con el CID correcto */
        #welcome-screen { position: fixed; top:0; left:0; width:100%; height:100%; background: url('https://ipfs.io/ipfs/bafybeic3rhz5qpxq3slf4n77h6jwhtspd3jifjm2z7777cm4whniozi32u') center/cover; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        
        /* Marquee */
        .marquee-container { width: 100%; max-width: 350px; overflow: hidden; margin-bottom: 15px; }
        .marquee { display: flex; animation: scroll 15s linear infinite; }
        .marquee img { height: 40px; margin: 0 5px; }
        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        .video-container { width: 80%; max-width: 280px; height: 160px; border: 2px solid #00ffcc; border-radius: 10px; overflow: hidden; margin-bottom: 20px; background: rgba(0,0,0,0.5); }
        
        /* Botones y efectos */
        .btn { background: rgba(0,0,0,0.7); border: 1px solid #800080; padding: 8px; text-decoration: none; border-radius: 6px; font-size: 0.65em; color: #fff; animation: blink-bg 1.5s infinite; }
        @keyframes blink-bg { 0%, 100% { background: rgba(0,0,0,0.7); } 50% { background: rgba(128,0,128,0.5); } }

        .btn-pancake { width: 90%; max-width: 280px; height: 50px; background: url('https://yellow-fast-leopard-507.mypinata.cloud/ipfs/bafybeialafpyzu6sfct2xchwiza4xh2jcrfyrbonv2dkctnxocpaclcyci') center/cover; border: 2px solid #00ffcc; border-radius: 10px; margin-bottom: 20px; animation: border-blink 1.5s infinite; }
        @keyframes border-blink { 0%, 100% { border-color: #00ffcc; } 50% { border-color: #800080; } }

        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 90%; max-width: 350px; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="welcome-screen">

        <button onclick="document.getElementById('welcome-screen').style.display='none'" class="btn" style="padding: 15px 30px; font-size: 1.2em; border-color: #00ff00;">GO ecosystem ZAARD</button>
    </div>

    <div class="marquee-container">
        <div class="marquee">
            <img src="https://ipfs.io/ipfs/bafybeie5wqjyuwdezpoe5tqkqlojxv5evtdkv6mxhondx5hvod44txbobq">

    </div>

    <div class="video-container"><iframe src="https://www.youtube.com/embed/3ZLhfmZWLXk" style="width:100%; height:100%; border:none;"></iframe></div>

    <a href="https://app.binance.com/uni-qr/web3-token-details?tokenCA=0x3468ea4e6ce13ec4c7f8651f7efc6aa6046f4d65&binanceChainId=56" class="btn" style="border-radius:50%; width:60px; height:60px; margin-bottom:15px;">TOKEN</a>

        <a href="https://figueredo56.github.io/ZAARD-Arcade/index-menu.html" class="btn">ZAARD ARCADE</a>
        <a href="https://figueredo56.github.io/zaard-official/" class="btn">ZAARD WEB</a>

</html>
