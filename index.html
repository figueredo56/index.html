    <style>
        body { margin: 0; padding: 20px; font-family: sans-serif; text-align: center; color: white; background: url('https://ipfs.io/ipfs/bafybeidnbe4knxriwgp3hjnpupozk5xg6f75xvvhuottvudryqmxvsrleu') no-repeat center center fixed; background-size: cover; background-color: #000; }
        
        /* Carrusel superior */
        .marquee-container { width: 100%; overflow: hidden; margin: 15px 0; border-top: 1px solid #800080; border-bottom: 1px solid #800080; padding: 10px 0; background: rgba(0,0,0,0.5); }
        .marquee { display: flex; white-space: nowrap; animation: scroll 20s linear infinite; gap: 20px; align-items: center; }
        .marquee img { width: 70px; height: 70px; border-radius: 50%; border: 2px solid #00ffcc; object-fit: cover; flex-shrink: 0; display: block; }
        @keyframes scroll { from { transform: translateX(100%); } to { transform: translateX(-100%); } }

        /* Botón Token */
        .token-container { margin: 25px auto; }
        .btn-token { display: block; width: 130px; height: 130px; margin: 0 auto; border-radius: 50%; border: 4px solid #fff; background: url('https://ipfs.io/ipfs/bafybeiggz26x26hncisti5s5y74ciuk4yuymtczhsbwdufoql2gidl57mu') no-repeat center center; background-size: cover; animation: pulse 1.5s infinite; }
        .token-label { display: block; margin-top: 10px; font-weight: bold; font-size: 1.3em; animation: blink-text 1.5s infinite; text-decoration: none; }

        /* Sección Vídeo */
        .video-container { max-width: 600px; margin: 20px auto; border: 2px solid #00ffcc; border-radius: 10px; overflow: hidden; }

        /* Sección Swap */
        .swap-section { background: url('https://ipfs.io/ipfs/bafybeiby2hij6rb775xb4jqdguxvpqjkvhnacsjbqwb6lzjcwuglj6frse') no-repeat center center; background-size: cover; padding: 30px; border-radius: 20px; margin: 20px auto; max-width: 500px; border: 3px solid #800080; }
        .contract-text { color: white; font-weight: bold; font-size: 1em; margin: 10px 0; background: rgba(0,0,0,0.4); padding: 5px; border-radius: 5px; word-break: break-all; }
        .swap-info { color: #00ff00; font-weight: bold; font-size: 1.2em; text-shadow: 2px 2px 4px #000; }
        
        .btn-go-pancake { display: block; width: 180px; height: 180px; margin: 15px auto; background: url('https://ipfs.io/ipfs/bafybeiakl2nuugolggppxfttwcxfsv56zsjms4ityd5vjyyd54ctirzaeq') no-repeat center center; background-size: contain; border: none; }
        .go-label { color: #00ff00; font-weight: bold; font-size: 1.4em; margin-top: -10px; text-decoration: none; display: block; }

        /* Canales */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; max-width: 800px; margin: 20px auto; }
        .btn { background: rgba(0, 0, 0, 0.7); border: 2px solid #800080; color: #00ffcc; padding: 15px; text-decoration: none; border-radius: 8px; font-weight: bold; transition: 0.3s; }
        .btn:hover { background: #800080; color: white; }

        /* Animaciones */
        @keyframes blink-text { 0% { color: #800080; } 50% { color: #00ccff; } 100% { color: #000; } }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(128,0,128, 0.7); } 70% { box-shadow: 0 0 0 20px rgba(128,0,128, 0); } 100% { box-shadow: 0 0 0 0 rgba(128,0,128, 0); } }
    </style>
